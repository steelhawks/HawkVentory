name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real values are injected by the deploy workflow
          # via GitHub Secrets. The app handles missing config gracefully (SetupScreen).
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''
